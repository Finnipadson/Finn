<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>YT AdBlocker</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <span id="logo">⛔</span>
      <span id="title">YT AdBlocker</span>
    </div>

    <div id="toggle-row">
      <span id="toggle-label">Aktiv</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-input" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div id="counter-box">
      <div id="counter-num">0</div>
      <div id="counter-label">Ads geblockt</div>
    </div>

    <button id="reset-btn">Zähler zurücksetzen</button>

    <div id="status-line" class="active">Schutz aktiv</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
