<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Klick auf einen Button um das Icon zu downloaden:</p>
<canvas id="c48" width="48" height="48" style="display:block;margin:8px"></canvas>
<canvas id="c96" width="96" height="96" style="display:block;margin:8px"></canvas>
<button onclick="download(48)">Download icon48.png</button>
<button onclick="download(96)">Download icon96.png</button>

<script>
function drawIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  const s = size;

  // Background circle
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.arc(s/2, s/2, s/2, 0, Math.PI*2);
  ctx.fill();

  // White shield shape
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  const cx = s/2, top = s*0.15, bot = s*0.88;
  ctx.moveTo(cx, top);
  ctx.lineTo(s*0.82, s*0.28);
  ctx.lineTo(s*0.82, s*0.55);
  ctx.quadraticCurveTo(s*0.82, bot, cx, bot);
  ctx.quadraticCurveTo(s*0.18, bot, s*0.18, s*0.55);
  ctx.lineTo(s*0.18, s*0.28);
  ctx.closePath();
  ctx.fill();

  // Red X
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = s * 0.12;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(s*0.36, s*0.36); ctx.lineTo(s*0.64, s*0.64);
  ctx.moveTo(s*0.64, s*0.36); ctx.lineTo(s*0.36, s*0.64);
  ctx.stroke();

  return canvas;
}

[48, 96].forEach(size => {
  const c = drawIcon(size);
  document.getElementById('c'+size).getContext('2d').drawImage(c, 0, 0);
});

function download(size) {
  const canvas = drawIcon(size);
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `icon${size}.png`;
  a.click();
}
</script>
</body>
</html>
